services:
  postgres:
    image: postgres:16-alpine
    container_name: palavritas-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: palavritas
    ports:
      - "5433:5432"
    volumes:
      - palavritas_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-metabase-db.sql:/docker-entrypoint-initdb.d/01-init-metabase-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d palavritas"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Metabase UI: http://localhost:3000
  # Ao conectar o banco "palavritas" no Metabase, use:
  #   Host: postgres | Porta: 5432 | Banco: palavritas | User/Pass: admin
  metabase:
    image: metabase/metabase:v0.62.3
    container_name: palavritas-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: admin
      MB_DB_PASS: admin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  palavritas_pgdata:
